<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline';" />
<title>Oceano quick chat</title>
<style>
  :root{
    --ground:#06121a; --panel:#0d2734; --panel-2:#0a1f2b; --line:#17394a;
    --ink:#dcedf3; --muted:#84a4b3; --faint:#5b7885; --cyan:#3ad6e3; --cyan-2:#1f97a6;
    --you:#123240; --err:#e37a68;
    --mono:ui-monospace,"JetBrains Mono",Menlo,Consolas,monospace;
    --sans:ui-sans-serif,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:linear-gradient(180deg,var(--ground),#040e15);
    color:var(--ink); font-family:var(--sans); display:flex; flex-direction:column;
    height:100vh; overflow:hidden; border:1px solid var(--line); border-radius:12px;
  }
  header{
    display:flex; align-items:center; gap:9px; padding:11px 13px; -webkit-app-region:drag;
    border-bottom:1px solid var(--line); background:var(--panel-2);
  }
  .dot{width:8px;height:8px;border-radius:50%;background:var(--cyan);box-shadow:0 0 10px var(--cyan);flex:none}
  .ttl{font-family:var(--mono);font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted)}
  .grow{flex:1}
  header button{-webkit-app-region:no-drag}
  .icobtn{background:transparent;border:1px solid var(--line);color:var(--muted);border-radius:8px;
    font-size:12px;padding:5px 9px;cursor:pointer;font-family:var(--mono)}
  .icobtn:hover{color:var(--cyan);border-color:var(--cyan-2)}
  #auth{display:none;padding:9px 13px;font-size:12.5px;color:var(--err);background:rgba(227,122,104,.08);
    border-bottom:1px solid var(--line)}
  #auth a{color:var(--cyan);cursor:pointer;text-decoration:underline}
  #log{flex:1;overflow-y:auto;padding:14px 13px;display:flex;flex-direction:column;gap:10px}
  #log::-webkit-scrollbar{width:8px}#log::-webkit-scrollbar-thumb{background:var(--line);border-radius:8px}
  .msg{max-width:88%;padding:9px 12px;border-radius:12px;font-size:14px;line-height:1.5;white-space:pre-wrap;word-wrap:break-word}
  .me{align-self:flex-end;background:var(--you);border:1px solid var(--line);border-bottom-right-radius:4px}
  .bot{align-self:flex-start;background:var(--panel);border:1px solid var(--line);border-bottom-left-radius:4px}
  .bot.err{border-color:var(--err);color:var(--err)}
  .status{align-self:flex-start;font-family:var(--mono);font-size:11px;color:var(--faint);letter-spacing:.03em;padding:0 4px}
  .empty{margin:auto;color:var(--faint);font-size:13px;text-align:center;line-height:1.7;padding:20px}
  footer{padding:10px;border-top:1px solid var(--line);background:var(--panel-2);display:flex;gap:8px;align-items:flex-end}
  textarea{flex:1;resize:none;background:var(--ground);color:var(--ink);border:1px solid var(--line);
    border-radius:10px;padding:9px 11px;font-family:var(--sans);font-size:14px;line-height:1.4;max-height:120px;outline:none}
  textarea:focus{border-color:var(--cyan-2)}
  .send{background:var(--cyan);color:#04222a;border:none;border-radius:10px;padding:0 15px;height:38px;
    font-weight:640;cursor:pointer;font-size:14px}
  .send:hover{filter:brightness(1.08)}
  .send.stop{background:transparent;color:var(--err);border:1px solid var(--err)}
</style>
</head>
<body>
  <header>
    <span class="dot"></span><span class="ttl">Oceano · quick chat</span>
    <span class="grow"></span>
    <button class="icobtn" id="open">client ↗</button>
  </header>
  <div id="auth">Not signed in — <a id="login">open the client</a> and log in, then come back.</div>
  <div id="log">
    <div class="empty">Ask Oceano anything.<br />Enter to send · Shift+Enter for a newline.<br />Double-click the tray for the full client.</div>
  </div>
  <footer>
    <textarea id="in" rows="1" placeholder="Message Oceano…"></textarea>
    <button class="send" id="send">Send</button>
  </footer>

<script>
  const log = document.getElementById('log');
  const input = document.getElementById('in');
  const sendBtn = document.getElementById('send');
  const authBar = document.getElementById('auth');
  let botEl = null, statusEl = null, streaming = false;

  document.getElementById('open').onclick = () => window.qc.openClient();
  document.getElementById('login').onclick = () => window.qc.openClient();

  function clearEmpty(){ const e = log.querySelector('.empty'); if (e) e.remove(); }
  function scroll(){ log.scrollTop = log.scrollHeight; }
  function addMsg(cls, text){ clearEmpty(); const d = document.createElement('div'); d.className = 'msg ' + cls; d.textContent = text || ''; log.appendChild(d); scroll(); return d; }
  function setStatus(text){
    if (!text){ if (statusEl){ statusEl.remove(); statusEl = null; } return; }
    if (!statusEl){ statusEl = document.createElement('div'); statusEl.className = 'status'; log.appendChild(statusEl); }
    statusEl.textContent = text; scroll();
  }

  function startTurn(){ streaming = true; sendBtn.textContent = 'Stop'; sendBtn.classList.add('stop'); }
  function endTurn(){ streaming = false; sendBtn.textContent = 'Send'; sendBtn.classList.remove('stop'); setStatus(''); botEl = null; }

  function submit(){
    if (streaming){ window.qc.stop(); endTurn(); return; }
    const text = input.value.trim();
    if (!text) return;
    addMsg('me', text);
    input.value = ''; input.style.height = 'auto';
    botEl = addMsg('bot', '');
    setStatus('· thinking …');
    startTurn();
    window.qc.send(text);
  }
  sendBtn.onclick = submit;
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey){ e.preventDefault(); submit(); }
  });
  input.addEventListener('input', () => { input.style.height = 'auto'; input.style.height = Math.min(input.scrollHeight, 120) + 'px'; });

  window.qc.onAuth((me) => { authBar.style.display = (me && me.authed) ? 'none' : 'block'; });
  window.qc.onToken((t) => { if (botEl){ setStatus(''); botEl.textContent += t; scroll(); } });
  window.qc.onEvent((ev) => {
    if (!ev || !ev.type) return;
    if (ev.type === 'notice' && ev.text) setStatus('· ' + ev.text);
    else if (ev.type === 'tool_progress' || ev.type === 'tool' || ev.type === 'tool_call') setStatus('· working …');
    else if (ev.type === 'reasoning') setStatus('· reasoning …');
  });
  window.qc.onError((d) => { if (botEl){ botEl.classList.add('err'); botEl.textContent = (botEl.textContent || '') + (d && d.message ? d.message : 'error'); } else addMsg('bot err', (d && d.message) || 'error'); endTurn(); });
  window.qc.onDone(() => { if (botEl && !botEl.textContent) botEl.textContent = '(no reply)'; endTurn(); });
</script>
</body>
</html>
